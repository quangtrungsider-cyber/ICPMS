      certificate: ""
      cleanup-interval-seconds: 0
      domain-verification-interval-seconds: 60
      domain-verification-resolver-addr: 8.8.8.8:53
      private-key: ""
      session-duration: 604800

  aws:
    access-key-id: "minioadmin"
    bucket: "icpms-files"
    endpoint: "http://minio:9000"
    region: "us-east-1"
    secret-access-key: "minioadmin123"
    use-path-style: true

  base-url: http://192.168.110.128

  branding: true
  chrome-dp-addr: ""
  common-pattern-enrichment-worker:
    interval: 60
    max-concurrency: 1
    stale-after: 600
    agent-max-turns: 5
    agent-timeout: 30

  connectors: null

  custom-domains:
    acme:
      account-key: ""
      directory: ""
      email: "admin@vatm.vn"
      key-type: EC256
      root-ca: ""
    caa-issuer-domain: ""
    cname-target: ""
    provision-interval: 3600
    renewal-interval: 86400
    resolver-addr: 8.8.8.8:53

  encryption-key: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=

  esign:
    tsa-url: ""

  evidence-describer:
    interval: 30
    max-concurrency: 2
    stale-after: 300

  llm:
    defaults:
      max-tokens: 4096
      model-name: "gpt-4o-mini"
      provider: "openai"
      temperature: 0.1
    providers:
      openai:
        type: openai
        api-key: "sk-fake-test-key-for-startup-only"

  notifications:
    mailer:
      mailer-interval: 60
      sender-email: no-reply@vatm.vn
      sender-name: VATM ICPMS
      smtp:
        addr: ""
        hello-name: ""
        password: ""
        tls-required: false
        user: ""
    slack:
      sender-interval: 60
      signing-secret: ""
    webhook:
      cache-ttl: 86400
      sender-interval: 5

  pg:
    addr: db:5432
    ca-cert-bundle: ""
    database: probod
    debug: false
    health-check-period-seconds: 60
    max-conn-idle-time-seconds: 1800
    max-conn-lifetime-jitter-seconds: 300
    max-conn-lifetime-seconds: 3600
    min-pool-size: 5
    password: icpms2026secure
    pool-size: 20
    username: probod

  scim-bridge:
    poll-interval: 30
    sync-interval: 900

  third-party-vetting-worker:
    interval: 30
    max-concurrency: 1
    stale-after: 1500

  tracker-mapping-worker:
    interval: 30
    max-concurrency: 1
    stale-after: 600
    agent-max-turns: 5
    agent-timeout: 30
    disambiguation-agent-timeout: 30

  icpms-ocr-service:
    url: "http://icpms-ocr:8765"
    timeout-seconds: 900
    enabled: true

  trust-center:
    http-addr: :8090
    https-addr: ""
    proxy-protocol:
      trusted-proxies: null

unit:
  metrics:
    addr: ""
  tracing:
    addr: ""
    batch-timeout: 5
    export-timeout: 30
    max-batch-size: 512
    max-queue-size: 2048
