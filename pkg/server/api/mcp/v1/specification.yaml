      go.probo.inc/mcpgen/type: go.probo.inc/probo/pkg/coredata.CountryCode

    Profile:
      type: object
      required:
        - id
        - organization_id
        - full_name
        - email_address
        - additional_email_addresses
        - kind
        - source
        - state
        - created_at
        - updated_at
      properties:
        id:
          $ref: "#/components/schemas/GID"
          description: Profile ID
        organization_id:
          $ref: "#/components/schemas/GID"
          description: Organization ID
        full_name:
          type: string
          description: Full name
        email_address:
          $ref: "#/components/schemas/EmailAddress"
          description: Primary email address
        additional_email_addresses:
          type: array
          items:
            $ref: "#/components/schemas/EmailAddress"
          description: Additional email addresses
        kind:
          type:
            - string
            - "null"
          description: Profile kind
        source:
          $ref: "#/components/schemas/ProfileSource"
          description: Profile source (MANUAL, SCIM, or SAML)
        state:
          $ref: "#/components/schemas/ProfileState"
          description: Profile state (ACTIVE or INACTIVE)
        position:
          type:
            - string
            - "null"
          description: Position
        contract_start_date:
          type:
            - string
            - "null"
          format: date-time
          description: Contract start date
        contract_end_date:
          type:
            - string
            - "null"
          format: date-time
          description: Contract end date
        created_at:
          type: string
          format: date-time
          description: Creation timestamp
        updated_at:
          type: string
          format: date-time
          description: Update timestamp

    ListUsersInput:
      type: object
      required:
        - organization_id
      properties:
        organization_id:
          $ref: "#/components/schemas/GID"
          description: Organization ID
        order_by:
          $ref: "#/components/schemas/ProfileOrderBy"
          description: User order by
        size:
          type: integer
          description: Page size
        cursor:
          $ref: "#/components/schemas/CursorKey"
          description: Page cursor
        filter:
          type: object
          properties:
            contract_ended:
              type: boolean
              description: Filter by contract status. True returns only users with ended contracts, false returns only users with active or no contract.
            state:
              $ref: "#/components/schemas/ProfileState"
              description: Filter by profile state (ACTIVE or INACTIVE)

    ListUsersOutput:
      type: object
      required:
        - users
      properties:
        next_cursor:
          $ref: "#/components/schemas/CursorKey"
          description: Next cursor
        users:
          type: array
          items:
            $ref: "#/components/schemas/Profile"

    GID:
      type: string
      format: string
      go.probo.inc/mcpgen/type: go.probo.inc/probo/pkg/gid.GID

    CursorKey:
      type: string
      format: string
      go.probo.inc/mcpgen/type: go.probo.inc/probo/pkg/page.CursorKey

    ListOrganizationsInput:
      type: object
      properties:
        organization_id:
          $ref: "#/components/schemas/GID"
          description: Organization ID

    ListOrganizationsOutput:
      type: object
      properties:
        organizations:
          type: array
          items:
            $ref: "#/components/schemas/Organization"

    Organization:
      type: object
      required:
        - id
        - name
        - description
        - created_at
        - updated_at
      properties:
        id:
          $ref: "#/components/schemas/GID"
          description: Organization ID
        name:
          type: string
          description: Organization name
        description:
          type:
            - string
            - "null"
          description: Organization description
        created_at:
          type: string
          format: date-time
          description: Creation timestamp
        updated_at:
          type: string
          format: date-time
          description: Update timestamp

    ListThirdPartiesInput:
      type: object
      required:
        - organization_id
      properties:
        organization_id:
          $ref: "#/components/schemas/GID"
          description: Organization ID
        first_level:
          type: boolean
          description: Filter by first-level status
        order_by:
          $ref: "#/components/schemas/ThirdPartyOrderBy"
          description: ThirdParty order by
        size:
          type: integer
          description: Page size
        cursor:
          $ref: "#/components/schemas/CursorKey"
          description: Page cursor

    ListThirdPartiesOutput:
      type: object
      required:
        - thirdParties
      properties:
        next_cursor:
          $ref: "#/components/schemas/CursorKey"
          description: Next cursor
        thirdParties:
          type: array
          items:
            $ref: "#/components/schemas/ThirdParty"

    CreateThirdPartyThirdPartyMappingInput:
      type: object
      required:
        - parent_third_party_id
        - child_third_party_id
      properties:
        parent_third_party_id:
          $ref: "#/components/schemas/GID"
          description: Parent third party ID
        child_third_party_id:
          $ref: "#/components/schemas/GID"
          description: Child third party ID

    CreateThirdPartyThirdPartyMappingOutput:
      type: object

    DeleteThirdPartyThirdPartyMappingInput:
      type: object
      required:
        - parent_third_party_id
        - child_third_party_id
      properties:
        parent_third_party_id:
          $ref: "#/components/schemas/GID"
          description: Parent third party ID
        child_third_party_id:
          $ref: "#/components/schemas/GID"
          description: Child third party ID

    DeleteThirdPartyThirdPartyMappingOutput:
      type: object

    ListChildThirdPartiesInput:
      type: object
      required:
        - parent_third_party_id
      properties:
        parent_third_party_id:
          $ref: "#/components/schemas/GID"
          description: Parent third party ID
        order_by:
          $ref: "#/components/schemas/ThirdPartyOrderBy"
          description: ThirdParty order by
        size:
          type: integer
          description: Page size
        cursor:
          $ref: "#/components/schemas/CursorKey"
          description: Page cursor

    ListChildThirdPartiesOutput:
      type: object
      required:
        - thirdParties
      properties:
        next_cursor:
          $ref: "#/components/schemas/CursorKey"
          description: Next cursor
        thirdParties:
          type: array
          items:
            $ref: "#/components/schemas/ThirdParty"

    ThirdParty:
      type: object
      required:
        - id
        - name
        - organization_id
        - category
        - first_level
        - created_at
        - updated_at
      properties:
        id:
          $ref: "#/components/schemas/GID"
          description: ThirdParty ID
        organization_id:
          $ref: "#/components/schemas/GID"
          description: Organization ID
        name:
          type: string
          description: ThirdParty name
        description:
          type:
            - string
            - "null"
          description: ThirdParty description
        category:
          type: string
          enum:
            - ANALYTICS
            - CLOUD_MONITORING
            - CLOUD_PROVIDER
            - COLLABORATION
            - CUSTOMER_SUPPORT
            - DATA_STORAGE_AND_PROCESSING
            - DOCUMENT_MANAGEMENT
            - EMPLOYEE_MANAGEMENT
            - ENGINEERING
            - FINANCE
            - IDENTITY_PROVIDER
            - IT
            - MARKETING
            - OFFICE_OPERATIONS
            - OTHER
            - PASSWORD_MANAGEMENT
            - PRODUCT_AND_DESIGN
            - PROFESSIONAL_SERVICES
            - RECRUITING
            - SALES
            - SECURITY
            - VERSION_CONTROL
          description: ThirdParty category
        headquarter_address:
          type:
            - string
            - "null"
          description: Headquarter address
        legal_name:
          type:
            - string
            - "null"
          description: Legal name
        website_url:
          type:
            - string
            - "null"
          description: Website URL
        privacy_policy_url:
          type:
            - string
            - "null"
          description: Privacy policy URL
        service_level_agreement_url:
          type:
            - string
            - "null"
          description: Service level agreement URL
        data_processing_agreement_url:
          type:
            - string
            - "null"
          description: Data processing agreement URL
        business_associate_agreement_url:
          type:
            - string
            - "null"
          description: Business associate agreement URL
        subprocessors_list_url:
          type:
            - string
            - "null"
          description: Subprocessors list URL
        certifications:
          type: array
          items:
            type: string
          description: Certifications
        countries:
          type: array
          items:
            type: string
          description: Countries or regions (ISO 3166-1 alpha-2 country codes, EU, or GLOBAL)
        business_owner_id:
          anyOf:
            - $ref: "#/components/schemas/GID"
            - type: "null"
          description: Business owner ID
        security_owner_id:
          anyOf:
            - $ref: "#/components/schemas/GID"
            - type: "null"
          description: Security owner ID
        status_page_url:
          type:
            - string
            - "null"
          description: Status page URL
        terms_of_service_url:
          type:
            - string
            - "null"
          description: Terms of service URL
        security_page_url:
          type:
            - string
            - "null"
          description: Security page URL
        trust_page_url:
          type:
            - string
            - "null"
          description: Trust page URL
        first_level:
          type: boolean
          description: Whether this is a first-level third party
        created_at:
          type: string
          format: date-time
          description: Creation timestamp
        updated_at:
          type: string
          format: date-time
          description: Update timestamp

    ThirdPartyRiskAssessment:
      type: object
      required:
        - id
        - organization_id
        - third_party_id
        - expires_at
        - data_sensitivity
        - business_impact
        - created_at
        - updated_at
      properties:
        id:
          $ref: "#/components/schemas/GID"
          description: ThirdParty risk assessment ID
        organization_id:
          $ref: "#/components/schemas/GID"
          description: Organization ID
        third_party_id:
          $ref: "#/components/schemas/GID"
          description: ThirdParty ID
        expires_at:
          type: string
          format: date-time
          description: Expiration timestamp
        data_sensitivity:
          $ref: "#/components/schemas/DataSensitivity"
          description: Data sensitivity level
        business_impact:
          $ref: "#/components/schemas/BusinessImpact"
          description: Business impact level
        notes:
          type:
            - string
            - "null"
          description: Notes
        created_at:
          type: string
          format: date-time
          description: Creation timestamp
        updated_at:
          type: string
          format: date-time
          description: Update timestamp

    ListThirdPartyRiskAssessmentsInput:
      type: object
      required:
        - third_party_id
      properties:
        third_party_id:
          $ref: "#/components/schemas/GID"
          description: ThirdParty ID
        order_by:
          $ref: "#/components/schemas/ThirdPartyRiskAssessmentOrderBy"
          description: ThirdParty risk assessment order by
        size:
          type: integer
          description: Page size
        cursor:
          $ref: "#/components/schemas/CursorKey"
          description: Page cursor

    ListThirdPartyRiskAssessmentsOutput:
      type: object
      required:
        - third_party_risk_assessments
      properties:
        next_cursor:
          $ref: "#/components/schemas/CursorKey"
          description: Next cursor
        third_party_risk_assessments:
          type: array
          items:
            $ref: "#/components/schemas/ThirdPartyRiskAssessment"

    AddThirdPartyRiskAssessmentInput:
      type: object
      required:
        - third_party_id
        - expires_at
        - data_sensitivity
        - business_impact
      properties:
        third_party_id:
          $ref: "#/components/schemas/GID"
          description: ThirdParty ID
        expires_at:
          type: string
          format: date-time
          description: Expiration timestamp
        data_sensitivity:
          $ref: "#/components/schemas/DataSensitivity"
          description: Data sensitivity level
        business_impact:
          $ref: "#/components/schemas/BusinessImpact"
          description: Business impact level
        notes:
          type: string
          description: Notes

    AddThirdPartyRiskAssessmentOutput:
      type: object
      required:
        - third_party_risk_assessment
      properties:
        third_party_risk_assessment:
          $ref: "#/components/schemas/ThirdPartyRiskAssessment"

    AddThirdPartyInput:
      type: object
      required:
        - organization_id
        - name
      properties:
        organization_id:
          $ref: "#/components/schemas/GID"
          description: Organization ID
        name:
          type: string
          description: ThirdParty name
        description:
          type: string
          description: ThirdParty description
        category:
          type: string
          enum:
            - ANALYTICS
            - CLOUD_MONITORING
            - CLOUD_PROVIDER
            - COLLABORATION
            - CUSTOMER_SUPPORT
            - DATA_STORAGE_AND_PROCESSING
            - DOCUMENT_MANAGEMENT
            - EMPLOYEE_MANAGEMENT
            - ENGINEERING
            - FINANCE
            - IDENTITY_PROVIDER
            - IT
            - MARKETING
            - OFFICE_OPERATIONS
            - OTHER
            - PASSWORD_MANAGEMENT
            - PRODUCT_AND_DESIGN
            - PROFESSIONAL_SERVICES
            - RECRUITING
            - SALES
            - SECURITY
            - VERSION_CONTROL
          description: ThirdParty category
        headquarter_address:
          type: string
          description: Headquarter address
        legal_name:
          type: string
          description: Legal name
        website_url:
          type: string
          description: Website URL
        privacy_policy_url:
          type: string
          description: Privacy policy URL
        service_level_agreement_url:
          type: string
          description: Service level agreement URL
        data_processing_agreement_url:
          type: string
          description: Data processing agreement URL
        business_associate_agreement_url:
          type: string
          description: Business associate agreement URL
        subprocessors_list_url:
          type: string
          description: Subprocessors list URL
        certifications:
          type: array
          items:
            type: string
          description: Certifications
        countries:
          type: array
          items:
            type: string
          description: Countries or regions (ISO 3166-1 alpha-2 country codes, EU, or GLOBAL)
        business_owner_id:
          $ref: "#/components/schemas/GID"
          description: Business owner ID
        security_owner_id:
          $ref: "#/components/schemas/GID"
          description: Security owner ID
        status_page_url:
          type: string
          description: Status page URL
        terms_of_service_url:
          type: string
          description: Terms of service URL
        security_page_url:
          type: string
          description: Security page URL
        trust_page_url:
          type: string
          description: Trust page URL

    AddThirdPartyOutput:
      type: object
      required:
        - thirdParty
      properties:
        thirdParty:
          $ref: "#/components/schemas/ThirdParty"

    UpdateThirdPartyInput:
      type: object
      required:
        - id
      properties:
        id:
          $ref: "#/components/schemas/GID"
          description: ThirdParty ID
        name:
          type: string
          description: ThirdParty name
        description:
          type: string
          description: ThirdParty description
        category:
          type: string
          enum:
            - ANALYTICS
            - CLOUD_MONITORING
            - CLOUD_PROVIDER
            - COLLABORATION
            - CUSTOMER_SUPPORT
            - DATA_STORAGE_AND_PROCESSING
            - DOCUMENT_MANAGEMENT
            - EMPLOYEE_MANAGEMENT
            - ENGINEERING
            - FINANCE
            - IDENTITY_PROVIDER
            - IT
            - MARKETING
            - OFFICE_OPERATIONS
            - OTHER
            - PASSWORD_MANAGEMENT
            - PRODUCT_AND_DESIGN
