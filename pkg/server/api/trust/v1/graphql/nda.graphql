  CERTIFICATE_GENERATED
    @goEnum(
      value: "go.probo.inc/probo/pkg/coredata.ElectronicSignatureEventTypeCertificateGenerated"
    )
  PROCESSING_ERROR
    @goEnum(
      value: "go.probo.inc/probo/pkg/coredata.ElectronicSignatureEventTypeProcessingError"
    )
