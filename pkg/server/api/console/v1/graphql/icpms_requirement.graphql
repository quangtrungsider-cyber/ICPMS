enum IcpmsRequirementType {
  OBLIGATION
  PROHIBITION
  RESPONSIBILITY
  PROCESS
  RECORD
  REPORTING
  TRAINING
  MONITORING
  REVIEW
  EVIDENCE
  INFORMATION
  OTHER
}

enum IcpmsApplicabilityStatus {
  APPLICABLE
  NOT_APPLICABLE
  NEEDS_REVIEW
  PARTIALLY_APPLICABLE
  UNKNOWN
}

enum IcpmsRequirementReviewStatus {
  CANDIDATE
  NEEDS_REVIEW
  REVIEWED
  APPROVED
  REJECTED
  ARCHIVED
}

enum IcpmsRequirementPriority {
  HIGH
  MEDIUM
  LOW
}

enum IcpmsRequirementGenerationJobStatus {
  PENDING
  RUNNING
  COMPLETED
  FAILED
}

type IcpmsRequirement implements Node @goModel(model: "go.probo.inc/probo/pkg/coredata.IcpmsRequirement") {
  id: ID!
  organizationId: ID!
  documentId: ID!
  document: IcpmsDocument!
  documentVersionId: ID!
  parseJobId: ID!
  sourceSectionId: ID
  sourceReference: String @goField(forceResolver: true)
  sourceSectionSummary: String @goField(forceResolver: true)
  requirementCode: String!
  title: String!
  description: String
  requirementType: IcpmsRequirementType!
  applicabilityStatus: IcpmsApplicabilityStatus!
  applicabilityNote: String
  reviewStatus: IcpmsRequirementReviewStatus!
  priority: IcpmsRequirementPriority!
  candidateScore: Int!
  keywordMatches: String
  isAutoGenerated: Boolean!
  aiReviewedAt: Datetime
  createdAt: Datetime!
  updatedAt: Datetime!
}

type IcpmsRequirementConnection {
  edges: [IcpmsRequirementEdge!]!
  totalCount: Int!
}

type IcpmsRequirementEdge {
  node: IcpmsRequirement!
}

type IcpmsRequirementGenerationJob implements Node @goModel(model: "go.probo.inc/probo/pkg/coredata.IcpmsRequirementGenerationJob") {
  id: ID!
  organizationId: ID!
  parseJobId: ID!
  status: IcpmsRequirementGenerationJobStatus!
  totalCandidates: Int!
  totalCreated: Int!
  totalSkipped: Int!
  totalDuplicates: Int!
  errorMessage: String
  startedAt: Datetime
  finishedAt: Datetime
  createdAt: Datetime!
  updatedAt: Datetime!
}

input GenerateRequirementsFromParseJobInput {
  parseJobId: ID!
}

type GenerateRequirementsPayload {
  generationJob: IcpmsRequirementGenerationJob
  requirementsCreated: Int!
}

input IcpmsRequirementsFilterInput {
  parseJobId: ID
  requirementType: IcpmsRequirementType
  reviewStatus: IcpmsRequirementReviewStatus
  applicabilityStatus: IcpmsApplicabilityStatus
  priority: IcpmsRequirementPriority
}

input UpdateIcpmsRequirementInput {
  id: ID!
  title: String
  description: String
  requirementType: IcpmsRequirementType
  applicabilityStatus: IcpmsApplicabilityStatus
  reviewStatus: IcpmsRequirementReviewStatus
  priority: IcpmsRequirementPriority
}

type UpdateIcpmsRequirementPayload {
  requirement: IcpmsRequirement
}

extend type Mutation {
  generateRequirementsFromParseJob(
    input: GenerateRequirementsFromParseJobInput!
  ): GenerateRequirementsPayload!
  updateIcpmsRequirement(
    input: UpdateIcpmsRequirementInput!
  ): UpdateIcpmsRequirementPayload!
  deleteIcpmsRequirementsForDocument(documentId: ID!): Int!
  deleteIcpmsRequirementsForVersion(documentVersionId: ID!): Int!
  deleteIcpmsRequirement(id: ID!): Boolean!
  approveIcpmsRequirementsForParseJob(parseJobId: ID!): Int!
}

extend type Query {
  icpmsRequirementsForOrganization(
    organizationId: ID!
    filter: IcpmsRequirementsFilterInput
  ): [IcpmsRequirement!]! @goField(forceResolver: true)
  latestRequirementGenerationJobForParseJob(
    parseJobId: ID!
  ): IcpmsRequirementGenerationJob @goField(forceResolver: true)
}
