# Types

type RiskAssessment implements Node {
    id: ID!
    name: String!
    description: String
    organization: Organization @goField(forceResolver: true)

    scopes(
        first: Int
        after: CursorKey
        last: Int
        before: CursorKey
        orderBy: RiskAssessmentScopeOrder
    ): RiskAssessmentScopeConnection @goField(forceResolver: true)

    createdAt: Datetime!
    updatedAt: Datetime!
    permission(action: String!): Boolean! @goField(forceResolver: true)
}

type RiskAssessmentScope implements Node {
    id: ID!
    riskAssessmentId: ID!
    name: String!

    nodes(
        first: Int
        after: CursorKey
        last: Int
        before: CursorKey
        orderBy: RiskAssessmentNodeOrder
    ): RiskAssessmentNodeConnection @goField(forceResolver: true)

    boundaries(
        first: Int
        after: CursorKey
        last: Int
        before: CursorKey
        orderBy: RiskAssessmentBoundaryOrder
    ): RiskAssessmentBoundaryConnection @goField(forceResolver: true)

    processes(
        first: Int
        after: CursorKey
        last: Int
        before: CursorKey
        orderBy: RiskAssessmentProcessOrder
    ): RiskAssessmentProcessConnection @goField(forceResolver: true)

    threats(
        first: Int
        after: CursorKey
        last: Int
        before: CursorKey
        orderBy: RiskAssessmentThreatOrder
    ): RiskAssessmentThreatConnection @goField(forceResolver: true)

    scenarios(
        first: Int
        after: CursorKey
        last: Int
        before: CursorKey
        orderBy: RiskAssessmentScenarioOrder
    ): RiskAssessmentScenarioConnection @goField(forceResolver: true)

    mermaidChart: String! @goField(forceResolver: true)

    createdAt: Datetime!
    updatedAt: Datetime!
}

type RiskAssessmentNode implements Node {
    id: ID!
    riskAssessmentScopeId: ID!
    boundaryId: ID
    nodeType: RiskAssessmentNodeType!
    name: String!
    createdAt: Datetime!
    updatedAt: Datetime!
}

type RiskAssessmentBoundary implements Node {
    id: ID!
    riskAssessmentScopeId: ID!
    parentBoundaryId: ID
    name: String!
    createdAt: Datetime!
    updatedAt: Datetime!
}

type RiskAssessmentProcess implements Node {
    id: ID!
    riskAssessmentScopeId: ID!
    sourceNodeId: ID!
    targetNodeId: ID!
    name: String!
    createdAt: Datetime!
    updatedAt: Datetime!
}

type RiskAssessmentThreat implements Node {
    id: ID!
    riskAssessmentScopeId: ID!
    processId: ID!
    name: String!
    category: String!
    createdAt: Datetime!
    updatedAt: Datetime!
}

type RiskAssessmentScenario implements Node {
    id: ID!
    riskAssessmentScopeId: ID!
    scope: RiskAssessmentScope @goField(forceResolver: true)
    name: String!
    description: String

    threats(
        first: Int
        after: CursorKey
        last: Int
        before: CursorKey
        orderBy: RiskAssessmentThreatOrder
    ): RiskAssessmentThreatConnection @goField(forceResolver: true)

    risks(
        first: Int
        after: CursorKey
        last: Int
        before: CursorKey
        orderBy: RiskOrder
    ): RiskConnection @goField(forceResolver: true)

    createdAt: Datetime!
    updatedAt: Datetime!
}

